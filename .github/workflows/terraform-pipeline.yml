name: Terraform CI/CD

on:
  push:
    branches: [main, peo/depoly-java]
  pull_request:
    branches: [main]
  workflow_dispatch:  

env:
  TF_VERSION: 1.11.2
  AWS_REGION: af-south-1
  ENVIRONMENT: prod
  FLYWAY_VERSION: 11.4.0

jobs:
  test-api:
    name: Build and Test API
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set Up JDK 21
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Cache Maven Dependencies
        uses: actions/cache@v3
        with:
          path: ~/.m2
          key: maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: maven-

      - name: Run Tests
        working-directory: ./api
        run: mvn clean test

  build-jar:
    name: Build JAR
    runs-on: ubuntu-latest
    needs: test-api

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set Up JDK 21
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Cache Maven Dependencies
        uses: actions/cache@v3
        with:
          path: ~/.m2
          key: maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: maven-

      - name: Build with Maven
        working-directory: ./api
        run: mvn clean package -DskipTests

      - name: Prepare Deployment Package
        working-directory: ./api
        run: |
          mkdir -p deploy
          cp target/*.jar deploy/application.jar
          
          # Create Procfile with JVM options inline
          echo "web: java -Xms256m -Xmx512m -Dspring.profiles.active=prod -Dserver.port=5000 -Dlogging.file.path=/var/log/ -jar application.jar" > deploy/Procfile
          
          # Package everything up
          cd deploy
          zip -r application.zip application.jar Procfile

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: application-zip
          path: ./api/deploy/application.zip

  deploy:
    name: Deploy to Elastic Beanstalk
    runs-on: ubuntu-latest
    needs: build-jar

    steps:
      - name: Download Built Artifact
        uses: actions/download-artifact@v4
        with:
          name: application-zip
          path: deploy

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: af-south-1

      - name: Get Beanstalk Environment Name
        run: |
          ENV_NAME=$(aws elasticbeanstalk describe-environments \
            --application-name ${{ vars.AWS_EB_APP_NAME }} \
            --query "Environments[0].EnvironmentName" --output text)
          echo "ENV_NAME=$ENV_NAME" >> $GITHUB_ENV

      - name: 📍 Get RDS Endpoint
        id: get-endpoint
        run: |
          ENDPOINT=$(aws rds describe-db-instances --db-instance-identifier ${{ vars.DB_IDENTIFIER }} --query 'DBInstances[0].Endpoint.Address' --output text)
          echo "RDS_ENDPOINT=$ENDPOINT" >> $GITHUB_ENV

      - name: Deploy to Elastic Beanstalk
        run: |
          # Generate a version label with timestamp
          VERSION_LABEL="v-$(date +%Y%m%d-%H%M%S)"
          echo "Using version: $VERSION_LABEL"
          
          # Upload the application bundle to S3
          aws s3 cp deploy/application.zip s3://dry-code-snippets-bucket/builds/application-$VERSION_LABEL.zip
          
          # Create a new application version
          aws elasticbeanstalk create-application-version \
          --application-name ${{ vars.AWS_EB_APP_NAME }} \
          --version-label "$VERSION_LABEL" \
          --source-bundle S3Bucket="dry-code-snippets-bucket",S3Key="builds/application-$VERSION_LABEL.zip"
          
          # Update the environment to use the new version
          aws elasticbeanstalk update-environment \
          --environment-name "$ENV_NAME" \
          --application-name ${{ vars.AWS_EB_APP_NAME }} \
          --version-label "$VERSION_LABEL"

  verify-deployment:
    name: Verify Deployment
    runs-on: ubuntu-latest
    needs: deploy

    steps:
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: af-south-1

      - name: Wait for Environment to be Ready
        run: |
          MAX_ATTEMPTS=30
          ATTEMPT=0
          
          while [ $ATTEMPT -lt $MAX_ATTEMPTS ]
          do
            STATUS=$(aws elasticbeanstalk describe-environments \
              --environment-names ${{ env.ENV_NAME }} \
              --query "Environments[0].Status" --output text)
          
            HEALTH=$(aws elasticbeanstalk describe-environments \
              --environment-names ${{ env.ENV_NAME }} \
              --query "Environments[0].Health" --output text)
          
            echo "Environment Status: $STATUS, Health: $HEALTH"
          
            if [ "$STATUS" = "Ready" ] && [ "$HEALTH" = "Green" ]; then
              echo "✅ Deployment successful!"
              break
            elif [ "$STATUS" = "Ready" ] && [ "$HEALTH" = "Red" ]; then
              echo "❌ Deployment failed - environment is unhealthy"
              exit 1
            fi
          
            ATTEMPT=$((ATTEMPT+1))
            echo "Waiting for deployment to complete... ($ATTEMPT/$MAX_ATTEMPTS)"
            sleep 30
          done
          
          if [ $ATTEMPT -eq $MAX_ATTEMPTS ]; then
            echo "❌ Deployment verification timed out"
            exit 1
          fi

      - name: Health Check API
        run: |
          EB_URL=$(aws elasticbeanstalk describe-environments \
            --environment-names ${{ env.ENV_NAME }} \
            --query "Environments[0].CNAME" --output text)
          
          # Adjust the health endpoint to match your application
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://$EB_URL/health || echo "Failed")
          
          echo "Health check status: $HTTP_STATUS"
          
          if [ "$HTTP_STATUS" = "200" ]; then
            echo "✅ API health check passed"
          else
            echo "❌ API health check failed"
            exit 1
          fi

      - name: Log Recent Events
        if: always()
        run: |
          echo "Recent environment events:"
          aws elasticbeanstalk describe-events \
            --environment-name $ENV_NAME \
            --max-items 10
